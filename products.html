<!DOCTYPE html>
<html>
<head>
<title>Products - EMart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f0f4f8;
    display: flex;
    min-height: 100vh;
  }

  
  .sidebar {
    width: 220px;
    background: white;
    box-shadow: 2px 0 10px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
  }

  .sidebar .brand {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    padding: 0 24px 24px;
    border-bottom: 1px solid #f0f0f0;
    margin-bottom: 16px;
  }

  .sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 24px;
    font-size: 14px;
    color: #666;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
    border-left: 3px solid transparent;
  }

  .sidebar a:hover,
  .sidebar a.active {
    background: #f0fdf9;
    color: #1abc9c;
    border-left-color: #1abc9c;
  }

  
  .navbar {
    position: fixed;
    top: 0;
    left: 220px;
    right: 0;
    height: 60px;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 10;
  }

  .navbar h3 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
  }

  
  .navbar input {
    padding: 8px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  .navbar input:focus { border-color: #1abc9c; }

 
  .main {
    margin-left: 220px;
    margin-top: 60px;
    padding: 28px;
    flex: 1;
  }

  
  .category-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .category-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e8e8e8;
    margin-left: 8px;
  }

  
  .product-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .product-card {
    width: 150px;
    background: white;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.1);
  }

  .product-card img {
    width: 100%;
    height: 110px;
    object-fit: cover;
    border-radius: 8px;
    background: #f0f4f8;
  }

  .product-card h4 {
    font-size: 13px;
    font-weight: 500;
    color: #333;
    margin-top: 8px;
  }

  .product-card .price {
    font-size: 13px;
    font-weight: 600;
    color: #1abc9c;
    margin-top: 4px;
  }

  
  .product-card.hidden { display: none; }
</style>
</head>
<body>


<div class="sidebar">
  <div class="brand">🛒 EMart</div>
  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="products.html" class="active">📦 Products</a>
  <a href="categories.html">📂 Categories</a>
  <a href="add_product.html">➕ Add Product</a>
  <a href="orders.html">🧾 Orders</a>
  <a href="login.html">🔐 Login</a>
  <a href="register.html">📝 Register</a>

<div class="navbar">

  {name:"Garam Masala", category:"🛢️ Cooking Essentials", img:"image/Garam.jpg", price:50}
];


const categories = {};
products.forEach(p => {
  if (!categories[p.category]) categories[p.category] = [];
  categories[p.category].push(p);
});
async function loadProducts() {
  try {
    const res = await fetch("http://localhost:5000/api/products");
    const products = await res.json();

    let table = document.getElementById("productTable");

    table.innerHTML = "";

    products.forEach(p => {
      table.innerHTML += `
        <tr>
          <td>${p.name}</td>
          <td>₹${p.price}</td>
          <td>${p.quantity}</td>
          <td>${p.category || "-"}</td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

window.onload = loadProducts;
let html = "";
for (let cat in categories) {
  html += `<h2 class="category-title">${cat}</h2>`;
  html += `<div class="product-grid">`;
  categories[cat].forEach(p => {
    html += `
      <div class="product-card" data-name="${p.name.toLowerCase()}">
        <img src="${p.img}" alt="${p.name}" onerror="this.style.background='#e8f5e9'">
        <h4>${p.name}</h4>
        <p class="price">₹${p.price}</p>
      </div>`;
  });
  html += `</div>`;
}
document.getElementById("mainContent").innerHTML = html;


function filterProducts() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".product-card").forEach(card => {
    card.classList.toggle("hidden", !card.dataset.name.includes(query));
  });
}
</script>
