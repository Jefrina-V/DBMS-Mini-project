<!DOCTYPE html>
<html>
<head>
<title>EMart Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: white; padding: 40px 36px; width: 360px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
  .logo { font-size: 36px; margin-bottom: 8px; }
  h2 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #999; margin-bottom: 28px; }
  .input-group { margin-bottom: 16px; text-align: left; }
  .input-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  .input-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 14px; color: #333; outline: none; transition: border-color 0.2s; }
  .input-group input:focus { border-color: #1abc9c; }
  .login-btn { width: 100%; padding: 12px; background: #1abc9c; color: white; border: none; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
  .login-btn:hover { background: #17a589; }
  .login-btn:disabled { background: #aaa; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 18px; color: #e74c3c; }
  .msg.success { color: #1abc9c; }
  .register-link { font-size: 13px; color: #999; margin-top: 16px; }
  .register-link a { color: #1abc9c; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">🛒</div>
  <h2>EMart</h2>
  <p class="subtitle">Sign in to your account</p>

  <div class="input-group">
    <label>Username or Email</label>
    <input id="user" type="text" placeholder="Enter username or email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input id="pass" type="password" placeholder="Enter password">
  </div>

  <button class="login-btn" onclick="login()" id="loginBtn">🔐 Login</button>
  <p class="msg" id="msg"></p>
  <p class="register-link">Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value;
  const msgEl    = document.getElementById("msg");
  const btn      = document.getElementById("loginBtn");

  msgEl.className = "msg";
  msgEl.textContent = "";

  if (!username || !password) {
    msgEl.textContent = "❌ Please fill all fields!";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const res = await fetch("http://localhost:5000/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = "❌ " + data.error;
      return;
    }

    // ✅ Save full user info including MongoDB _id to localStorage
    // This id will be used when adding products and orders
    localStorage.setItem("loggedInUser", JSON.stringify({
      id:       data.user.id,       // ✅ MongoDB _id — used to link products & orders
      username: data.user.username,
      email:    data.user.email
    }));

    msgEl.className = "msg success";
    msgEl.textContent = "✅ Login successful! Redirecting...";

    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);

  } catch (err) {
    msgEl.textContent = "❌ Failed to connect. Is the server running on port 5000?";
  } finally {
    btn.disabled = false;
    btn.textContent = "🔐 Login";
  }
}
</script>
</body>
</html>
